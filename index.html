<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>My Finance Tracker</title>
  <style>
    :root {
      --bg-color: #eef2f5;
      --card-bg: #ffffff;
      --income-green: #d1ead7;
      --income-text: #2d6a4f;
      --expense-red: #fde2e4;
      --expense-text: #9d0208;
      --savings-blue: #d0e8f2;
      --savings-text: #023e8a;
      --text-main: #2b2d42;
      --text-muted: #8d99ae;
      --accent: #457b9d;
    }

    * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

    body {
      background-color: var(--bg-color);
      margin: 0;
      padding: 0;
      padding-bottom: 70px; 
    }

    .app-container { width: 100vw; min-height: 100vh; padding: 20px; }

    hheader {
      display: block; text-align: center; color: var(--accent);
      font-weight: 800; letter-spacing: 2px; margin-bottom: 15px; margin-top: 10px;
    }

    /* STREAK BADGE CSS */
    .streak-container { display: flex; justify-content: center; margin-bottom: 20px; }
    .streak-badge {
      background: linear-gradient(135deg, #ffe3e3 0%, #ffc0c0 100%);
      color: #d90429;
      padding: 6px 16px;
      border-radius: 20px;
      font-weight: bold;
      font-size: 0.85rem;
      box-shadow: 0 4px 10px rgba(217, 4, 41, 0.15);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .view-section { display: none; animation: fadeIn 0.3s ease; }
    .view-section.active { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

    .net-worth { text-align: center; font-size: 2.5rem; font-weight: bold; color: var(--text-main); margin-bottom: 20px; }
    .net-worth span.label { display: block; font-size: 0.9rem; color: var(--text-muted); font-weight: normal; margin-bottom: 5px; }

    .wallet-cards { display: flex; gap: 10px; margin-bottom: 20px; }
    .card { flex: 1; padding: 15px; border-radius: 16px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.02); }
    .card h3 { margin: 0 0 5px 0; font-size: 0.8rem; font-weight: normal; }
    .card p { margin: 0; font-size: 1.2rem; font-weight: bold; }
    
    .card.online { background-color: var(--income-green); color: var(--income-text); }
    .card.cash { background-color: #e0e1dd; color: var(--text-main); }
    .card.savings { background-color: var(--savings-blue); color: var(--savings-text); width: 100%; margin-bottom: 30px; }

    .card-panel { background: var(--card-bg); padding: 20px; border-radius: 20px; margin-bottom: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); }
    .form-group { display: flex; gap: 10px; margin-bottom: 10px; }
    input, select, button { padding: 12px; border: 1px solid #eee; border-radius: 10px; font-size: 1rem; outline: none; width: 100%; background: #f9f9f9; }
    button.primary-btn { background-color: var(--accent); color: white; border: none; font-weight: bold; cursor: pointer; }

    h3.section-title { color: var(--text-muted); font-size: 0.85rem; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 1px; }
    .list-container { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
    .list-item { display: flex; justify-content: space-between; align-items: center; background: var(--card-bg); padding: 15px; border-radius: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.02); }
    .item-info h4 { margin: 0 0 5px 0; color: var(--text-main); font-size: 1rem; }
    .item-info p { margin: 0; font-size: 0.75rem; color: var(--text-muted); }
    .tx-amount { font-weight: bold; font-size: 1.1rem; text-align: right; }
    .tx-amount.income { color: var(--income-text); }
    .tx-amount.expense { color: var(--expense-text); }

    .bottom-nav {
      position: fixed; bottom: 0; left: 0; width: 100%;
      background: #ffffff; box-shadow: 0 -4px 20px rgba(0,0,0,0.05);
      display: flex; justify-content: space-around; padding: 10px 0;
      padding-bottom: env(safe-area-inset-bottom, 10px); 
    }
    .nav-btn {
      background: none; border: none; color: var(--text-muted);
      display: flex; flex-direction: column; align-items: center; gap: 5px;
      font-size: 0.75rem; font-weight: bold; width: auto; padding: 5px 20px; cursor: pointer;
    }
    .nav-btn svg { width: 24px; height: 24px; fill: currentColor; }
    .nav-btn.active { color: var(--accent); }
    
    .progress-bar { width: 100%; height: 6px; background: #eee; border-radius: 3px; margin-top: 8px; overflow: hidden; }
    .progress-fill { height: 100%; background: var(--accent); width: 0%; }
    
    .month-header { background: var(--accent); color: white; padding: 6px 15px; border-radius: 8px; font-weight: bold; font-size: 0.85rem; margin-top: 15px; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px; }

  </style>
</head>
<body>

<div class="app-container">
  <hheader>MY TRACKER</hheader>

  <div class="streak-container">
    <div class="streak-badge">
      🔥 <span id="streak-count">0</span> Day Streak
    </div>
  </div>

  <div id="view-home" class="view-section active">
    
    <div class="net-worth"><span class="label">Spendable Balance</span>Rs <span id="total-balance">0</span></div>

    <div class="wallet-cards">
      <div class="card online"><h3>Online</h3><p>Rs <span id="online-balance">0</span></p></div>
      <div class="card cash"><h3>Cash</h3><p>Rs <span id="cash-balance">0</span></p></div>
    </div>
    
    <div class="card savings" style="margin-bottom: 25px;">
      <h3>Locked in Savings Vault</h3>
      <p>Rs <span id="vault-balance">0</span></p>
    </div>

    <h3 class="section-title">Log Activity</h3>
    <div class="card-panel">
      <form id="add-tx-form">
        <div class="form-group">
          <input type="text" id="tx-title" placeholder="E.g., Bangle sale" required>
          <input type="number" id="tx-amount" placeholder="Amount" required min="1">
        </div>
        <div class="form-group">
          <select id="tx-type"><option value="expense">Expense (-)</option><option value="income">Income (+)</option></select>
          <select id="tx-wallet"><option value="online">Online</option><option value="cash">Cash</option></select>
        </div>
        <button type="submit" class="primary-btn">Add to Wallet</button>
      </form>
    </div>

    <h3 class="section-title">Recent (Last 5)</h3>
    <div class="list-container" id="tx-list"></div>
  </div>

  <div id="view-savings" class="view-section">
    <h3 class="section-title">Create New Goal</h3>
    <div class="card-panel">
      <form id="add-goal-form">
        <input type="text" id="goal-title" placeholder="What are we saving for?" required style="margin-bottom: 10px;">
        <div class="form-group">
          <input type="number" id="goal-amount" placeholder="Target Rs" required min="1">
          <input type="date" id="goal-date" required>
        </div>
        <button type="submit" class="primary-btn">Start Tracking</button>
      </form>
    </div>
    
    <h3 class="section-title">Active Goals</h3>
    <div class="list-container" id="goals-list"></div>
  </div>

  <div id="view-history" class="view-section">
    <h3 class="section-title">Full Transaction History</h3>
    
    <button onclick="downloadCSV()" class="primary-btn" style="background-color: #2b2d42; margin-bottom: 20px;">
      📥 Download to Excel (.csv)
    </button>
    
    <div class="list-container" id="history-list"></div>
  </div>

</div>

<nav class="bottom-nav">
  <button class="nav-btn active" onclick="switchTab('home')" id="nav-home">
    <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
    Home
  </button>
  <button class="nav-btn" onclick="switchTab('history')" id="nav-history">
    <svg viewBox="0 0 24 24"><path d="M13 3c-4.97 0-9 4.03-9 9H1l3.89 3.89.07.14L9 12H6c0-3.87 3.13-7 7-7s7 3.13 7 7-3.13 7-7 7c-1.93 0-3.68-.79-4.94-2.06l-1.42 1.42C8.27 19.99 10.51 21 13 21c4.97 0 9-4.03 9-9s-4.03-9-9-9zm-1 5v5l4.28 2.54.72-1.21-3.5-2.08V8H12z"/></svg>
    History
  </button>
  <button class="nav-btn" onclick="switchTab('savings')" id="nav-savings">
    <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm.31-8.86c-1.77-.45-2.34-.94-2.34-1.67 0-.84.79-1.43 2.1-1.43 1.38 0 1.9.66 1.94 1.64h1.71c-.05-1.34-.87-2.57-2.49-2.97V5H10.9v1.69c-1.51.32-2.72 1.3-2.72 2.81 0 1.79 1.49 2.69 3.66 3.21 1.95.46 2.34 1.15 2.34 1.87 0 .53-.39 1.64-2.25 1.64-1.74 0-2.33-.77-2.42-1.76H7.76c.14 1.8 1.5 2.92 3.14 3.28V19h2.34v-1.6c1.62-.3 2.81-1.38 2.81-2.92 0-2.38-2.23-2.96-3.74-3.34z"/></svg>
    Savings
  </button>
</nav>

<script>
  const TX_KEY = 'tracker_tx_v3';
  const GOALS_KEY = 'tracker_goals_v3';

  // --- TAB NAVIGATION ---
  function switchTab(tabId) {
    document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));
    document.getElementById('view-' + tabId).classList.add('active');
    document.getElementById('nav-' + tabId).classList.add('active');
  }

  // --- DATA FETCHING ---
  function getTransactions() { return JSON.parse(localStorage.getItem(TX_KEY)) || []; }
  function getGoals() { return JSON.parse(localStorage.getItem(GOALS_KEY)) || []; }

  // --- STREAK ENGINE ---
  function calculateStreak() {
    const txs = getTransactions();
    if (txs.length === 0) return 0;

    const dates = [...new Set(txs.map(t => new Date(t.date).toLocaleDateString('en-CA')))].sort((a,b) => b.localeCompare(a)); 
    const todayStr = new Date().toLocaleDateString('en-CA');
    
    const yesterday = new Date();
    yesterday.setDate(yesterday.getDate() - 1);
    const yesterdayStr = yesterday.toLocaleDateString('en-CA');

    if (dates[0] !== todayStr && dates[0] !== yesterdayStr) return 0;

    let streak = 0;
    let currentDate = new Date(dates[0]); 

    for (const dStr of dates) {
      const expectedStr = currentDate.toLocaleDateString('en-CA');
      if (dStr === expectedStr) {
        streak++; 
        currentDate.setDate(currentDate.getDate() - 1); 
      } else { break; }
    }
    return streak;
  }

  // --- MAIN RENDER ENGINE ---
  function renderApp() {
    const transactions = getTransactions();
    const goals = getGoals();
    
    let cashBal = 0, onlineBal = 0, vaultBal = 0;
    goals.forEach(g => { vaultBal += (g.saved || 0); });

    const txListEl = document.getElementById('tx-list');
    const historyListEl = document.getElementById('history-list');
    
    txListEl.innerHTML = '';
    historyListEl.innerHTML = '';
    
    // 1. Calculate Balances & Group History by Month
    const historyGroups = {};

    transactions.forEach(tx => {
      // Math
      const multiplier = tx.type === 'income' ? 1 : -1;
      const finalAmt = tx.amount * multiplier;
      if (tx.wallet === 'cash') cashBal += finalAmt;
      else onlineBal += finalAmt;

      // Grouping logic for History Tab
      const dateObj = new Date(tx.date);
      const monthYear = dateObj.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
      if(!historyGroups[monthYear]) historyGroups[monthYear] = [];
      historyGroups[monthYear].push(tx);
    });

    // 2. Render Full History Grouped by Month
    for (const [monthYear, groupTxs] of Object.entries(historyGroups)) {
      historyListEl.insertAdjacentHTML('beforeend', `<div class="month-header">${monthYear}</div>`);
      
      groupTxs.forEach(tx => {
        const dateObj = new Date(tx.date);
        const timeStr = dateObj.toLocaleDateString([], { month: 'short', day: 'numeric' }) + ' ' + dateObj.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        const sign = tx.type === 'income' ? '+' : '-';
        
        historyListEl.insertAdjacentHTML('beforeend', `
          <div class="list-item">
            <div class="item-info">
              <h4>${tx.title}</h4>
              <p>${tx.wallet.toUpperCase()} • ${timeStr}</p>
            </div>
            <div style="display: flex; align-items: center; gap: 15px;">
              <div class="tx-amount ${tx.type}">${sign}${tx.amount}</div>
              <button onclick="deleteTransaction('${tx.id}')" style="background: transparent; border: none; color: #d90429; font-size: 1.2rem; width: auto; padding: 0; margin: 0; cursor: pointer;">
                🗑️
              </button>
            </div>
          </div>
        `);
      });
    }

    // 3. Render Recent 5 on Dashboard
    const recentTx = transactions.slice(0, 5);
    recentTx.forEach(tx => {
      const dateObj = new Date(tx.date);
      const timeStr = dateObj.toLocaleDateString([], { month: 'short', day: 'numeric' }) + ' ' + dateObj.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      const sign = tx.type === 'income' ? '+' : '-';
      
      txListEl.insertAdjacentHTML('beforeend', `
        <div class="list-item">
          <div class="item-info"><h4>${tx.title}</h4><p>${tx.wallet.toUpperCase()} • ${timeStr}</p></div>
          <div class="tx-amount ${tx.type}">${sign}${tx.amount}</div>
        </div>
      `);
    });

    // 4. Update Header Numbers
    document.getElementById('total-balance').innerText = (cashBal + onlineBal).toLocaleString();
    document.getElementById('cash-balance').innerText = cashBal.toLocaleString();
    document.getElementById('online-balance').innerText = onlineBal.toLocaleString();
    document.getElementById('vault-balance').innerText = vaultBal.toLocaleString();
    document.getElementById('streak-count').innerText = calculateStreak();

    // 5. Render Savings Goals
    const goalsListEl = document.getElementById('goals-list');
    goalsListEl.innerHTML = '';
    const today = new Date();
    today.setHours(0,0,0,0);

    goals.forEach((goal, index) => {
      const targetDate = new Date(goal.date);
      const diffTime = targetDate - today;
      const daysLeft = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
      
      const saved = goal.saved || 0;
      const remaining = goal.amount - saved;
      const percent = Math.min((saved / goal.amount) * 100, 100);
      
      let statusText = "";
      if (remaining <= 0) statusText = "Goal Reached! 🎉";
      else if (daysLeft > 0) statusText = `Need Rs ${(remaining / daysLeft).toFixed(0)} / day`;
      else statusText = "Target date passed";

      goalsListEl.insertAdjacentHTML('beforeend', `
        <div class="list-item" style="flex-direction: column; align-items: stretch;">
          <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
            <div class="item-info">
              <h4>${goal.title}</h4>
              <p>Rs ${saved.toLocaleString()} / Rs ${goal.amount.toLocaleString()}</p>
            </div>
            <div style="text-align: right;">
              <strong style="font-size:0.9rem;">${daysLeft > 0 ? daysLeft + ' days left' : 'Due'}</strong>
              <span style="display:block; font-size:0.75rem; color:var(--accent); font-weight:bold;">${statusText}</span>
            </div>
          </div>
          <div class="progress-bar"><div class="progress-fill" style="width: ${percent}%"></div></div>
          
          <div style="display: flex; gap: 10px; margin-top: 15px;">
             <input type="number" id="deposit-amt-${index}" placeholder="Rs" style="padding: 8px; border: 1px solid #ddd; border-radius: 8px;">
             <select id="deposit-wallet-${index}" style="padding: 8px; border: 1px solid #ddd; border-radius: 8px;"><option value="online">Online</option><option value="cash">Cash</option></select>
             <button onclick="depositToGoal('${goal.id}', ${index})" class="primary-btn" style="padding: 8px; border-radius: 8px;">Add</button>
          </div>
        </div>
      `);
    });
  }

  // --- FORM LISTENERS & ACTIONS ---
  document.getElementById('add-tx-form').addEventListener('submit', function(e) {
    e.preventDefault();
    const transactions = getTransactions();
    transactions.unshift({
      id: Date.now().toString(),
      title: document.getElementById('tx-title').value,
      amount: parseFloat(document.getElementById('tx-amount').value),
      type: document.getElementById('tx-type').value,
      wallet: document.getElementById('tx-wallet').value,
      date: new Date().toISOString()
    });
    localStorage.setItem(TX_KEY, JSON.stringify(transactions));
    this.reset();
    renderApp();
  });

  document.getElementById('add-goal-form').addEventListener('submit', function(e) {
    e.preventDefault();
    const goals = getGoals();
    goals.push({
      id: Date.now().toString(),
      title: document.getElementById('goal-title').value,
      amount: parseFloat(document.getElementById('goal-amount').value),
      date: document.getElementById('goal-date').value,
      saved: 0
    });
    localStorage.setItem(GOALS_KEY, JSON.stringify(goals));
    this.reset();
    renderApp();
  });

  window.depositToGoal = function(goalId, index) {
    const amount = parseFloat(document.getElementById(`deposit-amt-${index}`).value);
    const wallet = document.getElementById(`deposit-wallet-${index}`).value;
    if (!amount || amount <= 0) return alert("Enter a valid amount");

    const transactions = getTransactions();
    transactions.unshift({
      id: Date.now().toString(),
      title: "Transfer to Vault",
      amount: amount,
      type: 'expense',
      wallet: wallet,
      date: new Date().toISOString()
    });
    localStorage.setItem(TX_KEY, JSON.stringify(transactions));

    const goals = getGoals();
    const goalIndex = goals.findIndex(g => g.id === goalId);
    if (goalIndex > -1) {
      goals[goalIndex].saved = (goals[goalIndex].saved || 0) + amount;
      localStorage.setItem(GOALS_KEY, JSON.stringify(goals));
    }
    renderApp();
  };

  window.deleteTransaction = function(id) {
    if (!confirm("Delete this transaction? Your balances will update automatically.")) return;
    const transactions = getTransactions();
    const updatedTransactions = transactions.filter(tx => tx.id !== id);
    localStorage.setItem(TX_KEY, JSON.stringify(updatedTransactions));
    renderApp();
  };

  window.downloadCSV = function() {
    const transactions = getTransactions();
    if (transactions.length === 0) return alert("No data to export!");
    let csvContent = "Date,Time,Title,Type,Wallet,Amount\n";
    transactions.forEach(tx => {
      const dateObj = new Date(tx.date);
      const dateStr = dateObj.toLocaleDateString('en-CA');
      const timeStr = dateObj.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      const safeTitle = `"${tx.title.replace(/"/g, '""')}"`; 
      csvContent += `${dateStr},${timeStr},${safeTitle},${tx.type},${tx.wallet},${tx.amount}\n`;
    });
    const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
    const link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = "Balanceera_Archive.csv";
    link.style.display = 'none';
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
  };

  // Start the engine
  renderApp();

</script>
</body>
</html>
